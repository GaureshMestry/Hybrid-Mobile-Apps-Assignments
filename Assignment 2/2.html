<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .table{
            width: 550px;
            height: 400px;
        }
    </style>
</head>

<body>
    <table border="1" class="table ">
        <tr>
            <td colspan="5" align="center"><strong>A</strong></td>
          
        </tr>

        <tr>
            <td rowspan="2" colspan="3" align="center"><strong>B</strong></td>
            <td colspan="2" align="center"><strong>C</strong></td>
        </tr>

        <tr>
            <td><strong>D</strong></td>
            <td><strong>E</strong></td>
        </tr>

        <tr>
            <!-- <td><strong>F</strong></td> -->
            <td rowspan="3" align="center"><strong>F</strong></td>
            <td colspan="4" align="center"><strong>G</strong></td>
        </tr>

        <tr>
            <td rowspan="2" align="center"><strong>H</strong></td>
            <td rowspan="2" align="center"><strong>I</strong></td>
            <td colspan="2" align="center"><strong>J</strong></td>
        </tr>

        <tr>
            <td colspan="2"><strong>K</strong></td>
        </tr>

        <tr>
            <td rowspan="2" colspan="4" align="center">
                <strong>L</strong>
            </td>
            <td>M</td>
        </tr>
        <tr>
            <td> N </td>
        </tr>
    </table>
</body>

</html>
