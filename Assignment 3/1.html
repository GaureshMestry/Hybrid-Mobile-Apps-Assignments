<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        .boxcontainer {
            height: 40px;
            width: 100%;
            display: flex;
            margin-bottom: 15px;
        }

        .red {
            background-color: red;
        }

        .blue {
            background-color: blue;

        }

        .green {
            background-color: green;
        }

        .yellow {
            background-color: rgb(242, 177, 46);
        }
    </style>
</head>

<body>
    <h1>Row1</h1>

        <div class="blue" style="width: 50%"></div>
    </div>

        <div class="blue" style="width: 10%"></div>
    </div>

            <div class="red" style="width: 20px; height: 20px; margin-left: 50%; margin-top:10px ;"></div>
        </div>

                </div>

            </div>


            <h1>Row 8</h1>
